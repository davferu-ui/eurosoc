name: Run Daily ESPN Scraper

on:
  schedule:
    # Runs automatically every single day at 08:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # This allows you to force-run it manually at any moment

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the script permission to save data back to your repo

    steps:
    - name: Download Repository Files
      uses: actions/checkout@v4

    - name: Start Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Scraping Tools
      run: pip install requests

    - name: Run Scraper
      run: python fetch_stats.py

    - name: Save and Commit Updated Data
      run: |
        git config --global user.name "EPL-Bot"
        git config --global user.email "actions@github.com"
        git add data.json
        # Only commit changes if the data has actually changed
        git diff-index --quiet HEAD || (git commit -m "Sync dynamic stats from ESPN" && git push)
