<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPL Daily Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f3f4f6; color: #1f2937; }
        h1 { text-align: center; color: #3b82f6; }
        .update-time { text-align: center; color: #6b7280; font-size: 0.85em; margin-bottom: 30px; }
        .match-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
        .status { font-weight: bold; font-size: 0.8em; text-transform: uppercase; color: #9ca3af; margin-bottom: 8px; block; }
        .live { color: #ef4444; }
        .teams-container { display: flex; justify-content: space-between; align-items: center; font-size: 1.1em; font-weight: 600; }
        .score { font-size: 1.3em; font-weight: 800; color: #111827; }
        .empty-state { text-align: center; padding: 40px; color: #9ca3af; background: white; border-radius: 12px; }
    </style>
</head>
<body>

    <h1>Premier League Matchday</h1>
    <p class="update-time" id="updated">Loading updates...</p>
    
    <div id="matches"></div>

    <script>
        // Fetch the raw data file generated by your background scraper
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error("Data file not generated yet.");
                return res.json();
            })
            .then(data => {
                document.getElementById('updated').innerText = `Last automated sync: ${data.lastUpdated}`;
                const container = document.getElementById('matches');
                
                if (!data.fixtures || data.fixtures.length === 0) {
                    container.innerHTML = '<div class="empty-state">No matches scheduled on ESPN for today.</div>';
                    return;
                }
                
                container.innerHTML = '';
                data.fixtures.forEach(f => {
                    const isLive = f.status.toLowerCase().includes('in') || f.status.toLowerCase().includes('live');
                    container.innerHTML += `
                        <div class="match-card">
                            <div class="status ${isLive ? 'live' : ''}">${f.status}</div>
                            <div class="teams-container">
                                <div>${f.homeTeam} vs ${f.awayTeam}</div>
                                <div class="score">${f.homeScore} - ${f.awayScore}</div>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('updated').innerText = "System is initializing. Waiting for the first automated pipeline build...";
                document.getElementById('matches').innerHTML = '<div class="empty-state">Data file arriving shortly!</div>';
            });
    </script>
</body>
</html>
